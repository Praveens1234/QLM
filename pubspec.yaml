name: qlm_mobile
description: QLM Mobile Application - Professional trading and analysis platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Material You (Material 3) design
  material_color_utilities: ^0.8.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # HTTP Client
  http: ^1.2.0
  dio: ^5.4.0

  # Chart Library
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^24.1.41

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.0.0

  # UI Components
  flutter_svg: ^2.0.9
  lottie: ^3.1.2
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  logger: ^2.0.2+1

  # Data Visualization
  syncfusion_flutter_datagrid: ^24.1.41
  syncfusion_flutter_gauges: ^24.1.41

  # WebSocket for real-time data
  web_socket_channel: ^2.4.5

  # File Management
  file_picker: ^6.1.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: fonts/JetBrainsMono-Regular.ttf
