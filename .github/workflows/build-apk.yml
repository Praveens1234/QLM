name: Build QLM Mobile APK

on:
  push:
    branches: [ mobile-apk ]
  pull_request:
    branches: [ mobile-apk ]

jobs:
  build:
    defaults:
      run:
        working-directory: qlm_mobile/qlm_mobile
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'
        cache: true
        cache-key: 'flutter-3.19.6'

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Create assets directory
      run: |
        mkdir -p assets/images
        mkdir -p assets/icons
        mkdir -p assets/animations

    - name: Create placeholder files
      run: |
        touch assets/animations/connection.json
        cat << 'EOF' > assets/images/readme.txt
        Add any required images here to make the build pass.
        This is a placeholder file to ensure the assets directory is created.
        EOF

    - name: Run flutter pub get
      run: flutter pub get

    - name: Analyze code
      run: flutter analyze --no-pub

    - name: Run tests
      run: flutter test
      continue-on-error: true

    - name: Build APK
      run: flutter build apk --release --no-tree-shake-icons

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: qlm-mobile-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: Create release
      if: github.ref == 'refs/heads/mobile-apk' && github.event_name == 'push'
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        # Tag with timestamp
        TAG_NAME="build-$(date +'%Y%m%d-%H%M%S')"
        git tag "$TAG_NAME"
        git push origin "$TAG_NAME"

        # Create GitHub Release (requires GH_TOKEN)
        gh release create "$TAG_NAME" \
          build/app/outputs/flutter-apk/app-release.apk \
          --title "QLM Mobile Build $TAG_NAME" \
          --notes "Automated build from GitHub Actions"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'
        cache: true

    - name: Run flutter pub get
      run: flutter pub get

    - name: Run lint
      run: flutter analyze --no-pub

    - name: Check formatting
      run: dart format --output=none --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'
        cache: true

    - name: Run flutter pub get
      run: flutter pub get

    - name: Run tests
      run: flutter test
      continue-on-error: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 7