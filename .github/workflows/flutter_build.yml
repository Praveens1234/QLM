name: Flutter CI/CD Build

on:
  push:
    branches:
      - Mobile-Application-Flutter
      - main
  pull_request:
    branches:
      - Mobile-Application-Flutter
      - main

env:
  FLUTTER_VERSION: '3.24.x'

jobs:
  build:
    name: Build & Analyze Flutter App
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Step 1: Checkout the code from the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java for Android build
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Step 3: Set up Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      # Step 4: Restore pub dependencies cache
      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ./mobile/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('./mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Step 5: Check project structure and scaffold Android if needed
      - name: Scaffold Android Project
        run: |
          cd mobile
          echo "Current directory: $(pwd)"
          echo "Checking if android directory exists..."
          
          if [ ! -d "android" ]; then
            echo "Android directory missing. Running flutter create..."
            # Backup project files that flutter create --overwrite would replace
            cp pubspec.yaml pubspec.yaml.bak
            cp analysis_options.yaml analysis_options.yaml.bak
            cp -r lib lib.bak
            cp -r test test.bak
            
            flutter create --project-name qlm_mobile --platforms android . --overwrite
            
            # Restore original project files
            cp pubspec.yaml.bak pubspec.yaml
            cp analysis_options.yaml.bak analysis_options.yaml
            rm -rf lib && mv lib.bak lib
            rm -rf test && mv test.bak test
            rm -f pubspec.yaml.bak analysis_options.yaml.bak
            
            echo "Checking if AndroidManifest.xml was created..."
            if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
              echo "AndroidManifest.xml created successfully"
            else
              echo "ERROR: AndroidManifest.xml not found after flutter create!"
              ls -la android/app/src/main/ || echo "Directory listing failed"
              exit 1
            fi
          else
            echo "Android directory exists. Skipping flutter create."
          fi

      # Step 6: Configure Android Build Settings for CI
      - name: Configure Android Build
        run: |
          cd mobile
          yes | flutter doctor --android-licenses || true

      # Step 7: Patch AndroidManifest with robust error handling
      - name: Patch AndroidManifest
        run: |
          echo "Patching AndroidManifest.xml..."
          cd mobile/android/app/src/main
          
          if [ -f "AndroidManifest.xml" ]; then
            echo "AndroidManifest.xml found, checking contents..."
            cat AndroidManifest.xml
            
            python3 << 'PYEOF'
          import sys
          try:
              with open('AndroidManifest.xml', 'r') as f:
                  data = f.read()
              
              # Check if already patched
              if 'android.permission.INTERNET' not in data:
                  if '<application' in data:
                      data = data.replace(
                          '<application',
                          '<uses-permission android:name="android.permission.INTERNET"/>\n    <application android:usesCleartextTraffic="true"',
                          1
                      )
                      with open('AndroidManifest.xml', 'w') as f:
                          f.write(data)
                      print("AndroidManifest patched successfully")
                  else:
                      print("Warning: <application tag not found", file=sys.stderr)
                      sys.exit(1)
              else:
                  print("Internet permission already present, skipping")
          except Exception as e:
              print(f"Error patching AndroidManifest: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          else
            echo "ERROR: AndroidManifest.xml not found at expected path!"
            exit 1
          fi

      # Step 8: Run Flutter doctor (verbose)
      - name: Flutter Doctor
        run: |
          cd mobile
          flutter doctor -v

      # Step 9: Install dependencies
      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get

      # Step 10: Analyze the code (strict mode)
      - name: Analyze Dart code
        run: |
          cd mobile
          flutter analyze --no-fatal-infos

      # Step 11: Run widget tests
      - name: Run widget tests
        continue-on-error: true
        run: |
          cd mobile
          flutter test

      # Step 12: Build the Android APK
      - name: Build APK
        run: |
          cd mobile
          flutter build apk --release

      # Step 13: Upload the built APK as a workflow artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: QLM_Mobile_Release_APK
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
