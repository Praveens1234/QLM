name: Flutter CI/CD Build

on:
  push:
    branches:
      - Mobile-Application-Flutter
      - main
  pull_request:
    branches:
      - Mobile-Application-Flutter
      - main

jobs:
  build:
    name: Build & Analyze Flutter App
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java for Android build
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      # Step 3: Set up Flutter SDK (Stable 3.22.x)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      # Step 4: Scaffold Android files if missing, avoiding destructive flutter create
      - name: Scaffold Android
        working-directory: ./mobile
        run: flutter create --project-name qlm_mobile --platforms android .

      # Step 5: Install dependencies
      - name: Install dependencies
        working-directory: ./mobile
        run: flutter pub get

      # Step 6: Analyze the code
      - name: Analyze Dart code
        working-directory: ./mobile
        run: flutter analyze --no-fatal-infos

      # Step 7: Build the Android APK
      - name: Build APK
        working-directory: ./mobile
        run: flutter build apk --release

      # Step 8: Upload the built APK as a workflow artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QLM_Mobile_Release_APK
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
